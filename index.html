<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>window.onerror = function(msg, url, line) { document.body.innerHTML = "<div style='color:white;background:red;padding:20px;z-index:99999;position:fixed;top:0;left:0;right:0;bottom:0;'><h1>ERROR</h1><p>"+msg+"</p><p>Line: "+line+"</p><p>URL: "+url+"</p></div>"; };</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

  <!-- SEO & Meta -->
  <title>Project Prime — Personal Fitness Dashboard</title>
  <meta name="description" content="AI-powered personal fitness dashboard for Pratham Sukhadia's 12-week body recomposition journey. Track workouts, nutrition, habits, and progress.">
  <meta name="keywords" content="fitness, workout tracker, meal plan, habit tracker, body recomposition, Project Prime">
  <meta name="author" content="Pratham Sukhadia">

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Prime">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Project Prime">
  <meta name="msapplication-TileColor" content="#10b981">

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/icon-96.png">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">

  <!-- Apple Splash Screens (simplified) -->
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Preconnect CDNs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="./css/design-system.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
  <link rel="stylesheet" href="./css/animations.css">

  <!-- Open Graph -->
  <meta property="og:title" content="Project Prime — Personal Fitness Dashboard">
  <meta property="og:description" content="12-week body recomposition journey tracker">
  <meta property="og:type" content="website">
</head>
<body>
  <!-- App Container -->
  <div id="app">
    <!-- Page Content (rendered by router) -->
    <div id="page-content" class="page-container"></div>
  </div>

  <!-- Modal Overlay & Sheet -->
  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal-sheet" id="modal-sheet"></div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Loading Screen -->
  <div id="loading-screen" style="
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0a0f;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  ">
    <div style="
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    ">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5h11v11h-11z"/>
        <path d="M6.5 6.5L12 2l5.5 4.5"/>
        <path d="M6.5 17.5L12 22l5.5-4.5"/>
      </svg>
    </div>
    <div style="color: #f1f5f9; font-family: Inter, sans-serif; font-size: 18px; font-weight: 700;">Project Prime</div>
    <div style="color: #64748b; font-family: Inter, sans-serif; font-size: 12px;">Loading your dashboard...</div>
  </div>

  <!-- External Libraries (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Data -->
  <script src="./js/data/quotes.js"></script>
  <script src="./js/data/workouts.js"></script>
  <script src="./js/data/meals.js"></script>
  <script src="./js/data/exercises.js"></script>
  <script src="./js/data/achievements.js"></script>

  <!-- Utilities -->
  <script src="./js/utils/date.js"></script>
  <script src="./js/utils/animations.js"></script>
  <script src="./js/utils/notifications.js"></script>

  <!-- Core -->
  <script src="./js/store.js"></script>
  <script src="./js/router.js"></script>

  <!-- Components -->
  <script src="./js/components/card.js"></script>
  <script src="./js/components/progress-ring.js"></script>
  <script src="./js/components/chart.js"></script>
  <script src="./js/components/modal.js"></script>
  <script src="./js/components/toast.js"></script>
  <script src="./js/components/timer.js"></script>
  <script src="./js/components/habit-check.js"></script>
  <script src="./js/components/nav.js"></script>

  <!-- Pages -->
  <script src="./js/pages/dashboard.js"></script>
  <script src="./js/pages/workout.js"></script>
  <script src="./js/pages/nutrition.js"></script>
  <script src="./js/pages/progress.js"></script>
  <script src="./js/pages/habits.js"></script>
  <script src="./js/pages/schedule.js"></script>
  <script src="./js/pages/exercise-lib.js"></script>
  <script src="./js/pages/coach.js"></script>
  <script src="./js/pages/settings.js"></script>
  <script src="./js/pages/achievements.js"></script>

  <!-- App Entry Point -->
  <script src="./js/app.js"></script>

  <!-- Hide loading screen after app loads -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.visibility = 'hidden';
          setTimeout(() => loader.remove(), 500);
        }
      }, 600);
    });
  </script>
</body>
</html>
